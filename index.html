<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="uni-talk">
<meta name="format-detection" content="telephone=no">
<title>uni-talk Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #F0F0F0;
    overflow-x: hidden;
  }

  .page-wrap {
    width: 100%;
    max-width: 680px;
    padding: 20px 12px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Hook ── */
  .hook {
    width: 28px;
    height: 28px;
    border: 3px solid #BDBDBD;
    border-radius: 50%;
    position: relative;
    margin-bottom: -14px;
    z-index: 2;
    background: #F0F0F0;
  }
  .hook::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 8px;
    background: #BDBDBD;
    border-radius: 1px;
  }

  /* ── Calendar Card ── */
  .cal-card {
    width: 100%;
    background: #FFFFFF;
    border-radius: 8px;
    padding: 28px 24px 24px;
    box-shadow:
      0 2px 8px rgba(0,0,0,0.08),
      0 8px 32px rgba(0,0,0,0.06);
    position: relative;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .month-num {
    font-family: 'Fredoka', sans-serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    color: #1B8C3E;
  }

  .month-en {
    font-family: 'Fredoka', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: #1B8C3E;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .year-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #888;
  }

  .nav-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 6px;
  }

  .nav-btn {
    background: none;
    border: none;
    font-size: 20px;
    color: #AAA;
    cursor: pointer;
    padding: 4px 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    -webkit-user-select: none;
    user-select: none;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .nav-btn:active { color: #555; background: #F5F5F5; }

  /* ── Weekday Header ── */
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 2px;
    padding: 0 4px;
  }

  .weekday {
    text-align: center;
    padding: 6px 0;
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Color cycling for weekdays ── */
  .wd-sun { color: #E53935; }
  .wd-mon { color: #FF6F00; }
  .wd-tue { color: #1B8C3E; }
  .wd-wed { color: #0277BD; }
  .wd-thu { color: #7B1FA2; }
  .wd-fri { color: #D84315; }
  .wd-sat { color: #42A5F5; }

  /* ── Calendar Grid ── */
  .cal-grid {
    padding: 0 4px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    align-items: stretch;
  }

  .cal-day {
    position: relative;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    text-align: center;
    padding: 4px 2px 4px;
    border-radius: 8px;
    transition: background 0.12s;
  }
  .cal-day:active { background: #F8F8F8; }
  .cal-day.empty { cursor: default; }

  .day-num {
    font-family: 'Fredoka', sans-serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1;
    opacity: 0.45;
    transition: transform 0.1s;
    margin-bottom: 2px;
  }
  .cal-day:active .day-num { transform: scale(0.95); }

  /* ── Lesson indicators ── */
  .lesson-indicator {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    margin-top: 0;
    width: 100%;
  }

  .lesson-tag {
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    background: #333;
    padding: 2px 4px;
    border-radius: 4px;
    width: 100%;
    max-width: 100%;
    word-break: break-all;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    cursor: pointer;
    line-height: 1.35;
    text-align: center;
  }
  .lesson-tag:active { opacity: 0.7; }

  .lesson-time-tag {
    font-size: 7.5px;
    color: #777;
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    line-height: 1;
  }

  /* ── Footer ── */
  .card-footer {
    text-align: center;
    margin-top: 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: #CCC;
  }

  /* ── Controls ── */
  .controls {
    max-width: 680px;
    width: 100%;
    padding: 16px 16px 32px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    background: #FFF;
    color: #555;
    border: 2px solid #DDD;
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    font-weight: 700;
    -webkit-user-select: none;
    user-select: none;
    transition: all 0.15s;
  }
  .ctrl-btn:active { background: #F5F5F5; }
  .ctrl-btn.active { background: #333; color: #FFF; border-color: #333; }

  .file-label { display: inline-flex; align-items: center; }
  .file-label input { display: none; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal-card {
    background: #FFF;
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: translateY(20px) scale(0.96);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .modal-overlay.open .modal-card { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 36px;
    font-weight: 700;
    text-align: center;
    line-height: 1;
  }

  .modal-subtitle {
    text-align: center;
    font-family: 'Fredoka', sans-serif;
    font-size: 12px;
    color: #AAA;
    margin-bottom: 22px;
    letter-spacing: 2px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .field-label {
    display: block;
    font-family: 'Fredoka', sans-serif;
    font-size: 12px;
    color: #AAA;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .field-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 3px solid #EEE;
    border-radius: 10px;
    background: #FAFAFA;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: #333;
    outline: none;
    margin-bottom: 16px;
    font-weight: 500;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: #FF9800; }

  .time-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .time-input {
    flex: 1;
    margin-bottom: 0;
  }

  .time-sep {
    font-family: 'Fredoka', sans-serif;
    font-size: 16px;
    color: #AAA;
    font-weight: 600;
    flex-shrink: 0;
  }

  .color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    justify-content: center;
  }

  .color-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s;
    -webkit-user-select: none;
    user-select: none;
  }
  .color-dot:active { transform: scale(0.9); }
  .color-dot.selected {
    border-color: #333;
    transform: scale(1.15);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 8px;
  }

  .btn-cancel {
    background: #F5F5F5;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    color: #999;
    font-family: 'Fredoka', sans-serif;
    cursor: pointer;
    font-weight: 600;
  }

  .btn-delete {
    background: #FFF0F0;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    color: #E53935;
    font-family: 'Fredoka', sans-serif;
    cursor: pointer;
    font-weight: 600;
  }

  .btn-save {
    background: #1B8C3E;
    border: none;
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 14px;
    color: #FFF;
    font-family: 'Fredoka', sans-serif;
    cursor: pointer;
    font-weight: 700;
  }
  .btn-save:active { background: #15732F; }

  /* ── Export mode ── */
  body.export-mode .nav-row,
  body.export-mode .controls { display: none !important; }
  body.export-mode .cal-day { cursor: default; }
  body.export-mode .lesson-tag { cursor: default; }

  /* ── Responsive ── */
  @media (max-width: 560px) {
    .cal-card { padding: 20px 10px 18px; }
    .month-num { font-size: 34px; }
    .month-en { font-size: 16px; }
    .year-label { font-size: 16px; }
    .day-num { font-size: 13px; }
    .cal-day { padding: 3px 1px 4px; }
    .weekday { font-size: 10px; letter-spacing: 0px; }
    .lesson-tag { font-size: 8px; padding: 1px 3px; }
    .lesson-time-tag { font-size: 6.5px; }
    .header { margin-bottom: 6px; }
    .nav-btn { padding: 6px 14px; font-size: 18px; }
    .controls { padding: 14px 12px 24px; gap: 8px; }
    .ctrl-btn { padding: 8px 14px; font-size: 12px; }
    .modal-card { padding: 24px 20px; }
    .modal-title { font-size: 28px; }
    .card-footer { margin-top: 10px; }
  }

  @media (max-width: 400px) {
    .page-wrap { padding: 12px 8px 0; }
    .cal-card { padding: 16px 8px 14px; }
    .month-num { font-size: 28px; }
    .month-en { font-size: 14px; }
    .year-label { font-size: 14px; }
    .day-num { font-size: 11px; }
    .cal-day { padding: 2px 1px 3px; }
    .weekday { font-size: 9px; }
    .lesson-tag { font-size: 7px; padding: 1px 2px; }
    .nav-row { gap: 8px; margin-bottom: 4px; }
    .header-left { gap: 6px; }
  }

  /* iPhone SE / very small screens */
  @media (max-width: 360px) {
    .day-num { font-size: 10px; }
    .cal-day { }
    .month-num { font-size: 24px; }
    .month-en { font-size: 12px; }
  }

  /* Safe area for notch / home indicator */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .controls { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.97); }
    100% { opacity: 1; transform: scale(1); }
  }
  .cal-grid { animation: popIn 0.35s ease-out; }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="hook"></div>

  <div class="cal-card">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="month-num" id="monthNum"></div>
        <div class="month-en" id="monthEn"></div>
      </div>
      <div class="year-label" id="yearLabel"></div>
    </div>

    <!-- Nav -->
    <div class="nav-row">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <!-- Weekdays -->
    <div class="weekdays">
      <div class="weekday wd-sun">SUN</div>
      <div class="weekday wd-mon">MON</div>
      <div class="weekday wd-tue">TUE</div>
      <div class="weekday wd-wed">WED</div>
      <div class="weekday wd-thu">THU</div>
      <div class="weekday wd-fri">FRI</div>
      <div class="weekday wd-sat">SAT</div>
    </div>

    <!-- Grid -->
    <div class="cal-grid" id="calGrid"></div>

    <div class="card-footer">✂ uni-talk ✂</div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="ctrl-btn" id="exportBtn" onclick="toggleExport()">📷 スクショ用</button>
  <button class="ctrl-btn" onclick="exportJSON()">💾 保存</button>
  <label class="ctrl-btn file-label">
    📂 読込
    <input type="file" accept=".json" onchange="importJSON(event)">
  </label>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>

    <label class="field-label">Lesson</label>
    <input class="field-input" type="text" id="inputName" placeholder="水彩画入門">

    <label class="field-label">Time</label>
    <div class="time-row">
      <input class="field-input time-input" type="time" id="inputTimeStart" value="10:00">
      <span class="time-sep">〜</span>
      <input class="field-input time-input" type="time" id="inputTimeEnd" value="11:00">
    </div>

    <label class="field-label">Color</label>
    <div class="color-picker" id="colorPicker"></div>

    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
const MONTH_EN = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

// Header accent color per month
const MONTH_COLORS = [
  "#1B8C3E","#E53935","#FF69B4","#43A047","#4CAF50","#7B1FA2",
  "#0277BD","#FF6F00","#5D4037","#E65100","#1565C0","#C62828"
];

// Weekday-based colors: Sun, Mon, Tue, Wed, Thu, Fri, Sat
// Each column shares the same color for visual consistency
const WEEKDAY_COLORS = [
  "#E53935",  // Sun - red
  "#FF6F00",  // Mon - orange
  "#1B8C3E",  // Tue - green
  "#0277BD",  // Wed - blue
  "#7B1FA2",  // Thu - purple
  "#D84315",  // Fri - deep orange
  "#42A5F5"   // Sat - light blue
];

// Lesson tag color options for the color picker
var LESSON_COLORS = [
  "#E53935",
  "#FF6F00",
  "#F9A825",
  "#43A047",
  "#0277BD",
  "#7B1FA2",
  "#EC407A",
  "#00897B",
  "#5D4037",
  "#455A64"
];

var selectedColor = LESSON_COLORS[0];

const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let lessons = {};
let isExport = false;
let modalDay = null;
let modalEditIdx = null;

function key(y, m, d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

function hash(s) { let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return Math.abs(h); }

function saveLocal() {
  try { localStorage.setItem('craft_cal_pop', JSON.stringify(lessons)); } catch(e) { /* localStorage unavailable */ }
}
function loadLocal() {
  try {
    var d = localStorage.getItem('craft_cal_pop');
    if (d) lessons = JSON.parse(d);
  } catch(e) { /* localStorage unavailable */ }
}

function render() {
  const mc = MONTH_COLORS[currentMonth];
  document.getElementById('monthNum').textContent = currentMonth + 1;
  document.getElementById('monthNum').style.color = mc;
  document.getElementById('monthEn').textContent = MONTH_EN[currentMonth];
  document.getElementById('monthEn').style.color = mc;
  document.getElementById('yearLabel').textContent = currentYear;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  var totalWeeks = cells.length / 7;
  grid.style.gridTemplateRows = 'repeat(' + totalWeeks + ', 1fr)';

  for (var i = 0; i < cells.length; i++) {
    (function(i) {
      var j = i % 7;
      var day = cells[i];
      var dayEl = document.createElement('div');
      dayEl.className = 'cal-day';

      if (day === null) {
        dayEl.classList.add('empty');
      } else {
        var numEl = document.createElement('div');
        numEl.className = 'day-num';
        numEl.textContent = day;
        numEl.style.color = WEEKDAY_COLORS[j];
        dayEl.appendChild(numEl);

        var k = key(currentYear, currentMonth, day);
        var dayLessons = lessons[k] || [];
        if (dayLessons.length > 0) {
          var ind = document.createElement('div');
          ind.className = 'lesson-indicator';

          dayLessons.forEach(function(l, li) {
            if (li >= 3) return;
            var wrap = document.createElement('div');
            wrap.style.display = 'flex';
            wrap.style.flexDirection = 'column';
            wrap.style.alignItems = 'center';
            wrap.style.width = '100%';
            wrap.style.overflow = 'hidden';

            var t = document.createElement('div');
            t.className = 'lesson-time-tag';
            var ts = l.timeStart || l.time || '';
            var te = l.timeEnd || '';
            t.textContent = te ? ts + '-' + te : ts;

            var tag = document.createElement('div');
            tag.className = 'lesson-tag';
            tag.textContent = l.name;
            tag.style.background = l.color || LESSON_COLORS[0];

            tag.addEventListener('click', function(e) { e.stopPropagation(); if(!isExport) openModal(day, li); });

            wrap.appendChild(t);
            wrap.appendChild(tag);
            ind.appendChild(wrap);
          });

          if (dayLessons.length > 3) {
            var more = document.createElement('div');
            more.className = 'lesson-time-tag';
            more.textContent = '+' + (dayLessons.length - 3);
            more.style.marginTop = '1px';
            ind.appendChild(more);
          }

          dayEl.appendChild(ind);
        }

        dayEl.addEventListener('click', function() { if(!isExport) openModal(day, null); });
      }
      grid.appendChild(dayEl);
    })(i);
  }
}

function openModal(day, editIdx) {
  modalDay = day; modalEditIdx = editIdx;
  var nameInput = document.getElementById('inputName');
  var timeStart = document.getElementById('inputTimeStart');
  var timeEnd = document.getElementById('inputTimeEnd');
  var actionsEl = document.getElementById('modalActions');

  var titleEl = document.getElementById('modalTitle');
  titleEl.textContent = (currentMonth+1) + '/' + day;
  titleEl.style.color = WEEKDAY_COLORS[new Date(currentYear, currentMonth, day).getDay()];

  if (editIdx !== null) {
    document.getElementById('modalSubtitle').textContent = 'EDIT LESSON';
    var l = lessons[key(currentYear, currentMonth, day)][editIdx];
    nameInput.value = l.name;
    timeStart.value = l.timeStart || l.time || '10:00';
    timeEnd.value = l.timeEnd || '11:00';
    selectedColor = l.color || LESSON_COLORS[0];
  } else {
    document.getElementById('modalSubtitle').textContent = 'NEW LESSON';
    nameInput.value = '';
    timeStart.value = '10:00';
    timeEnd.value = '11:00';
    selectedColor = LESSON_COLORS[0];
  }

  // Render color picker
  var picker = document.getElementById('colorPicker');
  picker.innerHTML = '';
  for (var ci = 0; ci < LESSON_COLORS.length; ci++) {
    var dot = document.createElement('div');
    dot.className = 'color-dot';
    if (LESSON_COLORS[ci] === selectedColor) dot.className += ' selected';
    dot.style.background = LESSON_COLORS[ci];
    dot.setAttribute('data-color', LESSON_COLORS[ci]);
    dot.onclick = function() {
      selectedColor = this.getAttribute('data-color');
      var dots = picker.querySelectorAll('.color-dot');
      for (var di = 0; di < dots.length; di++) {
        dots[di].classList.remove('selected');
      }
      this.classList.add('selected');
    };
    picker.appendChild(dot);
  }

  actionsEl.innerHTML = '';
  if (editIdx !== null) {
    var d = document.createElement('button');
    d.className = 'btn-delete'; d.textContent = '削除'; d.onclick = deleteLesson;
    actionsEl.appendChild(d);
  }
  var c = document.createElement('button');
  c.className = 'btn-cancel'; c.textContent = 'キャンセル'; c.onclick = closeModal;
  actionsEl.appendChild(c);
  var s = document.createElement('button');
  s.className = 'btn-save'; s.textContent = '保存'; s.onclick = saveLesson;
  actionsEl.appendChild(s);

  history.pushState({ mode: 'modal' }, '');
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal').onclick = closeModal;
  setTimeout(function() { nameInput.focus(); }, 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalDay = null; modalEditIdx = null;
}

function saveLesson() {
  var name = document.getElementById('inputName').value.trim();
  var timeStart = document.getElementById('inputTimeStart').value;
  var timeEnd = document.getElementById('inputTimeEnd').value;
  if (!name) return;
  var k = key(currentYear, currentMonth, modalDay);
  if (!lessons[k]) lessons[k] = [];
  var lessonData = { name: name, timeStart: timeStart, timeEnd: timeEnd, color: selectedColor };
  if (modalEditIdx !== null) lessons[k][modalEditIdx] = lessonData;
  else lessons[k].push(lessonData);
  lessons[k].sort(function(a, b) { return (a.timeStart || a.time || '').localeCompare(b.timeStart || b.time || ''); });
  saveLocal(); closeModal(); render();
}

function deleteLesson() {
  if (modalEditIdx === null) return;
  var k = key(currentYear, currentMonth, modalDay);
  lessons[k].splice(modalEditIdx, 1);
  if (lessons[k].length === 0) delete lessons[k];
  saveLocal(); closeModal(); render();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
}

function toggleExport() {
  isExport = !isExport;
  document.body.classList.toggle('export-mode', isExport);
  var btn = document.getElementById('exportBtn');
  btn.textContent = isExport ? '✦ 編集に戻る' : '📷 スクショ用';
  btn.classList.toggle('active', isExport);
  if (isExport) {
    history.pushState({ mode: 'export' }, '');
  }
}

function exportJSON() {
  var blob = new Blob([JSON.stringify(lessons, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url;
  a.download = 'uni-talk-calendar-' + currentYear + '.json';
  a.click(); URL.revokeObjectURL(url);
}

function importJSON(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try { lessons = JSON.parse(ev.target.result); saveLocal(); render(); }
    catch(err) { alert('読み込みに失敗しました'); }
  };
  reader.readAsText(file); e.target.value = '';
}

// Browser back button support
window.addEventListener('popstate', function(e) {
  // If export mode is on, turn it off
  if (isExport) {
    isExport = false;
    document.body.classList.remove('export-mode');
    var btn = document.getElementById('exportBtn');
    btn.textContent = '📷 スクショ用';
    btn.classList.remove('active');
    return;
  }
  // If modal is open, close it
  if (document.getElementById('modal').classList.contains('open')) {
    closeModal();
    return;
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) saveLesson();
});

loadLocal(); render();
</script>

</body>
</html>
